name: AccessFlow

options:
  bundleIdPrefix: com.accessflow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug
  xcodeVersion: "15"

configs:
  Debug: debug
  Release: release

targets:
  AccessFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AccessFlow
        excludes:
          - "**/.gitkeep"
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.accessflow.AccessFlow
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
